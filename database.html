<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEB RESTRICTED</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #050208;
      --cyan: #00d2ff;
      --purple: #b800ff;
      --red: #ff003c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at center, #110022 0%, var(--bg-color) 100%);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Efek Scanline Tri-Color */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
        linear-gradient(90deg, rgba(255, 0, 60, 0.08), rgba(184, 0, 255, 0.05), rgba(0, 210, 255, 0.08));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Background Grid Bergerak Ungu/Biru */
    .grid {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image:
        linear-gradient(rgba(255, 0, 60, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 210, 255, 0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(600px) rotateX(60deg);
      animation: gridMove 10s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      from { transform: perspective(600px) rotateX(60deg) translateY(0); }
      to { transform: perspective(600px) rotateX(60deg) translateY(40px); }
    }

    .container {
      text-align: center;
      padding: 40px;
      border: 1px solid rgba(184, 0, 255, 0.4);
      border-radius: 12px;
      background: rgba(10, 5, 15, 0.85);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(184, 0, 255, 0.2);
      max-width: 600px;
      width: 90%;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
    }

    /* Aksen sudut kotak Merah/Biru */
    .container::before, .container::after {
      content: "";
      position: absolute;
      width: 25px;
      height: 25px;
      border: 2px solid var(--cyan);
      opacity: 0.9;
      box-shadow: 0 0 10px var(--cyan);
    }

    .container::before {
      top: 10px; left: 10px; border-right: none; border-bottom: none;
    }

    .container::after {
      bottom: 10px; right: 10px; border-left: none; border-top: none;
      border-color: var(--red);
      box-shadow: 0 0 10px var(--red);
    }

    /* Animasi Title Tri-Color */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5em;
      letter-spacing: 8px;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 0 0 10px var(--purple), 0 0 20px var(--cyan), 0 0 40px var(--red);
      animation: pulseAlert 2.5s infinite alternate;
      text-transform: uppercase;
    }

    @keyframes pulseAlert {
      0% { text-shadow: 0 0 10px var(--purple), 0 0 20px var(--cyan), 0 0 30px var(--red); }
      100% { text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--red), 0 0 60px var(--purple); }
    }

    .warning-box {
      display: inline-block;
      padding: 5px 15px;
      background: rgba(255, 0, 60, 0.15);
      border: 1px solid var(--red);
      color: var(--red);
      font-weight: bold;
      letter-spacing: 3px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
      animation: blink 1.5s step-end infinite;
    }

    p {
      font-size: 1.2em;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .small {
      font-size: 0.9em;
      color: rgba(196, 212, 227, 0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    .btn-return {
      appearance: none;
      background: rgba(0, 210, 255, 0.05);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 12px 25px;
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    }

    .btn-return:hover {
      background: var(--cyan);
      color: #000;
      box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--purple);
      border-color: #fff;
    }
  </style>
</head>
<body>

  <div class="grid"></div>

  <div class="container">
    <div class="warning-box">RESTRICTED AREA</div>
    <h1>SOON</h1>
    <p id="typewriter">WEBSITE UNDER CONSTRUCTION...</p>
    <div class="small">System integration in progress. Dibuka kapan kapan...</div>
    
    <button class="btn-return" onclick="window.location.href='web.html'">>> RETURN TO OS</button>
  </div>

  <script>
    const textElement = document.getElementById('typewriter');
    const text = "WEBSITE UNDER CONSTRUCTION...";
    textElement.innerHTML = '';
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        textElement.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
      } else {
        // Kursor kelap-kelip cyan setelah ngetik selesai
        textElement.innerHTML += '<span style="animation: blink 1s step-end infinite; color: var(--cyan); text-shadow: 0 0 10px var(--cyan);">_</span>';
      }
    }

    setTimeout(typeWriter, 500);
  </script>

</body>
</html>
