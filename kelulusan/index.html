<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROPERTY ARM AREA</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="shortcut icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="favicon.png"> 
<meta property="og:title" content="AREA ANONYMOUS">
<meta property="og:description" content="Secure Digital Interface ARM">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00d2ff;
      --neon-purple: #b800ff;
      --neon-red: #ff003c;
      --bg-black: #050208; /* Hitam dengan sedikit tint ungu pekat */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at center, #110022 0%, var(--bg-black) 100%);
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
      color: var(--neon-blue);
    }

    /* Efek Grid Latar Belakang Digital - Mix Ungu & Biru */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        linear-gradient(rgba(184, 0, 255, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      transform: perspective(500px) rotateX(60deg);
      bottom: -50%;
      z-index: -1;
      animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 0 300px; }
    }

    .container {
      text-align: center;
      position: relative;
    }

    /* Header Teks Bergaya HUD - Glow Ungu/Merah */
    .loading-status {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 0 0 5px var(--neon-purple), 0 0 15px var(--neon-purple), 0 0 30px var(--neon-red);
      animation: pulseText 2s infinite alternate;
    }

    @keyframes pulseText {
      0% { text-shadow: 0 0 5px var(--neon-purple), 0 0 15px var(--neon-purple), 0 0 20px var(--neon-red); }
      100% { text-shadow: 0 0 10px var(--neon-purple), 0 0 25px var(--neon-red), 0 0 40px var(--neon-red); }
    }

    /* Progress Bar Tactical */
    .bar-wrapper {
      width: 320px;
      height: 3px;
      background: rgba(184, 0, 255, 0.2);
      position: relative;
      box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
      border-radius: 2px;
    }

    /* Gradasi Biru -> Ungu -> Merah */
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-red));
      box-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-red);
      position: relative;
      border-radius: 2px;
      animation: fillBar 4s cubic-bezier(0.1, 0, 0.3, 1) forwards;
    }

    /* Efek cahaya yang lari di bar */
    .bar-fill::after {
      content: "";
      position: absolute;
      top: -2px; left: 0; width: 40px; height: 7px;
      background: rgba(255, 255, 255, 0.8);
      filter: blur(4px);
      border-radius: 50%;
      animation: scan 1.5s infinite;
    }

    @keyframes fillBar {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes scan {
      0% { left: -10%; }
      100% { left: 110%; }
    }

    /* Teks konsol di bawah bar */
    .console-log {
      margin-top: 20px;
      font-size: 11px;
      color: var(--neon-blue);
      opacity: 0.9;
      letter-spacing: 2px;
      text-shadow: 0 0 8px var(--neon-blue);
    }

    .percentage {
      font-size: 28px;
      font-weight: bold;
      margin-top: 15px;
      color: var(--neon-red);
      text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-purple);
      font-family: 'Orbitron', sans-serif;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="loading-status">INITIALIZING PROXY</div>
    
    <div class="bar-wrapper">
      <div class="bar-fill"></div>
    </div>

    <div class="percentage" id="pct">0%</div>

    <div class="console-log">
      <span id="log-text">ESTABLISHING SECURE UPLINK...</span>
    </div>
  </div>

  <script>
    // Animasi angka persentase
    const pctElement = document.getElementById('pct');
    let count = 0;
    const interval = setInterval(() => {
      count++;
      pctElement.innerText = count + "%";
      if(count === 100) clearInterval(interval);
    }, 38);

    // Animasi teks log terminal
    const logs = [
      "DECRYPTING PORTAL...",
      "BYPASSING FIREWALL...",
      "AUTHORIZING ACCESS...",
      "WELCOME TO ARM AREA"
    ];
    let logIdx = 0;
    setInterval(() => {
      if(logIdx < logs.length) {
        document.getElementById('log-text').innerText = logs[logIdx];
        logIdx++;
      }
    }, 1000);

    // Redirect otomatis
    setTimeout(() => {
      window.location.href = "phantom.html";
    }, 4500);
  </script>

</body>
</html>
