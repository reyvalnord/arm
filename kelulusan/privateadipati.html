<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Auto Point Generator // E-Sports Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Base Colors */
      --bg: #050507;
      --surface: rgba(14, 14, 18, 0.75);
      --border: #1a1a24;
      --text-main: #f0f0f5;
      --text-muted: #8b8b9e;
      --font-ui: 'Outfit', sans-serif;
      --font-code: 'JetBrains Mono', monospace;
      
      /* Dynamic Theme Variables (Default to Bravo) */
      --accent: #ff0000;
      --accent-hover: #ff335f;
      --accent-glow: rgba(255, 0, 0, 0.35);
      --accent-bg: rgba(255, 0, 0, 0.08);
      --accent-dim: rgba(255, 0, 0, 0.15);
    }

    body.theme-bravo {
      --accent: #ff0000;
      --accent-hover: #ff335f;
      --accent-glow: rgba(255, 0, 0, 0.35);
      --accent-bg: rgba(255, 0, 0, 0.08);
      --accent-dim: rgba(255, 0, 0, 0.15);
    }
    body.theme-phantom {
      --accent: #00cfff;
      --accent-hover: #4fe4ff;
      --accent-glow: rgba(0, 207, 255, 0.35);
      --accent-bg: rgba(0, 207, 255, 0.08);
      --accent-dim: rgba(0, 207, 255, 0.15);
    }
    body.theme-omega {
      --accent: #9b5cff;
      --accent-hover: #c18bff;
      --accent-glow: rgba(155, 92, 255, 0.35);
      --accent-bg: rgba(155, 92, 255, 0.08);
      --accent-dim: rgba(155, 92, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 50% 0%, var(--accent-bg), transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      color: var(--text-main);
      font-family: var(--font-ui);
      padding: 24px;
      overflow-x: hidden;
      transition: background 0.4s ease;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    /* Cards / Panels */
    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }
    
    .card:hover {
      border-color: var(--accent-dim);
      box-shadow: 0 10px 40px var(--accent-bg);
    }

    .head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--accent-bg), transparent);
      border-top: 3px solid var(--accent);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 0 15px var(--accent-glow);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      font-family: var(--font-code);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      white-space: nowrap;
      box-shadow: inset 0 0 10px var(--accent-bg);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .sub {
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .body { padding: 24px; }

    /* Theme Switcher */
    .theme-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .theme-btn {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: var(--font-ui);
      font-size: 0.8rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      text-transform: uppercase;
    }
    
    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .theme-btn.active {
      color: #fff;
      background: var(--accent-bg);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-bg), inset 0 0 10px var(--accent-bg);
    }

    /* Controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .control-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      transition: border-color 0.3s ease;
    }
    
    .control-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-bg);
    }

    .control-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-family: var(--font-code);
    }

    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 0.95rem;
      font-family: var(--font-code);
      letter-spacing: 0.5px;
    }

    input::placeholder, textarea::placeholder {
      color: #4a4a5e;
    }

    /* Textarea */
    textarea {
      width: 100%;
      min-height: 380px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      padding: 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      font-family: var(--font-code);
      resize: vertical;
      transition: all 0.3s ease;
    }
    
    textarea:focus {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent), 0 0 20px var(--accent-bg);
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 12px 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
      flex: 1;
      min-width: 200px;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .btn-dark {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid var(--border);
    }
    
    .btn-dark:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: rgba(255, 51, 95, 0.1);
      color: #ff335f;
      border: 1px solid rgba(255, 51, 95, 0.3);
    }
    
    .btn-danger:hover {
      background: rgba(255, 51, 95, 0.2);
      transform: translateY(-2px);
    }

    .status {
      margin-top: 16px;
      color: var(--accent);
      font-family: var(--font-code);
      min-height: 20px;
      font-size: 0.8rem;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .hint {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px;
      border-radius: 8px;
      border: 1px dashed var(--border);
    }

    /* Preview Section */
    .preview-wrap { padding: 24px; height: 100%; display: flex; flex-direction: column; }
    
    .preview-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    
    .preview-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .small {
      font-family: var(--font-code);
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .preview-box {
      width: 100%;
      flex-grow: 1;
      min-height: 700px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #000;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }

    /* Mobile Responsiveness */
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .preview-box { min-height: 600px; }
    }

    @media (max-width: 600px) {
      body { padding: 12px; }
      .head, .body, .preview-wrap { padding: 16px; }
      textarea { min-height: 300px; }
      .preview-box { min-height: 500px; }
      .buttons { flex-direction: column; gap: 8px; }
      button { width: 100%; }
      .controls { grid-template-columns: 1fr; }
      .theme-switch { grid-template-columns: 1fr; gap: 8px; }
      h1 { font-size: 1.2rem; }
      .badge { font-size: 0.7rem; }
    }
  </style>
</head>

<body class="theme-bravo">
  <div class="wrap">
    
    <section class="card">
      <div class="head">
        <div class="title-row">
          <h1>Final Pointing System</h1>
          <div class="badge">
            <span class="dot"></span>
            <span id="themeBadgeText">VANGUARD-001</span>
          </div>
        </div>
        <div class="sub">Input decrypt data, select parameters, and deploy.</div>
      </div>

      <div class="body">
        <div class="theme-switch">
          <button class="theme-btn active" data-theme="bravo" onclick="setTheme('bravo')">BRAVO // MERAH</button>
          <button class="theme-btn" data-theme="phantom" onclick="setTheme('phantom')">PHANTOM // BIRU</button>
          <button class="theme-btn" data-theme="omega" onclick="setTheme('omega')">OMEGA // UNGU</button>
        </div>

        <div class="controls">
          <div class="control-box">
            <label class="control-label" for="outputNumber">Output Sequence</label>
            <input type="text" id="outputNumber" value="001" placeholder="001" autocomplete="off" spellcheck="false" />
          </div>

          <div class="control-box">
            <label class="control-label" for="fileName">Export Filename</label>
            <input type="text" id="fileName" value="point_0002" placeholder="point_0002" autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <textarea id="inputText" placeholder="> Paste extracted agent data here..."></textarea>

        <div class="hint">
          Auto-Detect Enabled: Paste raw table data or use format (Name, Med, Hard, Easy, Event)
        </div>

        <div class="buttons">
          <button class="btn-primary" onclick="generatePreview()">Run Diagnostics</button>
          <button class="btn-dark" onclick="downloadHTML()">Export HTML</button>
          <button class="btn-dark" onclick="copyHTML()">Copy Source</button>
          <button class="btn-danger" onclick="resetExample()">Wipe Data</button>
        </div>

        <div id="status" class="status">SYSTEM READY</div>
      </div>
    </section>

    <section class="card">
      <div class="preview-wrap">
        <div class="preview-header">
          <div class="preview-title">Live Preview</div>
          <div class="small">Syncing with active theme parameters</div>
        </div>
        <iframe id="preview" class="preview-box" title="preview"></iframe>
      </div>
    </section>

  </div>

  <script>
    const inputTextEl = document.getElementById('inputText');
    const previewEl = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    const outputNumberEl = document.getElementById('outputNumber');
    const fileNameEl = document.getElementById('fileName');
    const themeBadgeTextEl = document.getElementById('themeBadgeText');
    const themeButtons = Array.from(document.querySelectorAll('.theme-btn'));

    const themes = {
      bravo: { outputName: 'VANGUARD', accent: '#ff0000', bodyClass: 'theme-bravo' },
      phantom: { outputName: 'GHOST', accent: '#00cfff', bodyClass: 'theme-phantom' },
      omega: { outputName: 'APEX', accent: '#9b5cff', bodyClass: 'theme-omega' }
    };

    let currentTheme = 'bravo';
    let generatedHTML = '';

    function escapeHtml(text) {
      return String(text == null ? '' : text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sanitizeFileName(name) {
      return String(name || 'point_0002')
        .trim().replace(/[\\/:*?"<>|]+/g, '_').replace(/\s+/g, '_')
        .replace(/_+/g, '_').replace(/^_+|_+$/g, '') || 'point_0002';
    }

    function normalizeNumber(value) {
      return String(value || '').trim() || '001';
    }

    function setTheme(themeKey) {
      if (!themes[themeKey]) return;
      currentTheme = themeKey;
      document.body.className = themes[themeKey].bodyClass;

      themeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === themeKey);
      });

      themeBadgeTextEl.textContent = themes[themeKey].outputName + '-' + normalizeNumber(outputNumberEl.value);
      generatePreview();
    }

    function readNumber(line, key) {
      const regex = new RegExp('^' + key + '(?:\\s*\\+\\+)?\\s*:\\s*(-?\\d+)', 'i');
      const match = line.match(regex);
      return match ? (parseInt(match[1], 10) || 0) : null;
    }

    function parseBlocks(text) {
      const cleaned = String(text || '').replace(/\r/g, '').trim();
      if (!cleaned) return [];

      const lines = cleaned.split('\n').map(line => line.trim()).filter(Boolean);
      const items = [];
      const theme = themes[currentTheme];

      let current = {};

      function saveCurrent() {
        if (current.nickname) {
          const ez = current.easy || 0;
          const md = current.med || 0;
          const hd = current.hard || 0;
          const ev = current.event || 0;
          const tot = current.totalManual !== undefined ? current.totalManual : (ez + md + hd + ev);

          items.push({
            rank: current.rank || '',
            nickname: current.nickname,
            accessCode: current.code || '',
            easy: ez, med: md, hard: hd, event: ev,
            unit: theme.outputName + '-' + normalizeNumber(outputNumberEl.value),
            total: tot
          });
        }
        current = {};
      }

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        const mName = line.match(/^(\d+)\.\s*(.+)$/i);
        const mNick = line.match(/^(?:nama|nickname|nick|agent)\s*:\s*(.+)$/i);

        if (mName || mNick) {
          let extractedName = mName ? mName[2].trim() : mNick[1].trim();
          if (!/^[\d\s.,+-]+$/.test(extractedName)) { 
            saveCurrent();
            current.nickname = extractedName;
            if (mName) current.rank = mName[1].trim();
          }
          continue;
        }

        const mCode = line.match(/^(?:kode\s*akses|access\s*code|code)\s*:\s*(.+)$/i);
        if (mCode) { current.code = mCode[1].trim(); continue; }

        let vEZ = readNumber(line, 'easy'); if (vEZ !== null) { current.easy = vEZ; continue; }
        let vMD = readNumber(line, 'med'); if (vMD !== null) { current.med = vMD; continue; }
        let vHD = readNumber(line, 'hard'); if (vHD !== null) { current.hard = vHD; continue; }
        let vEV = readNumber(line, 'event'); if (vEV !== null) { current.event = vEV; continue; }
        let vTot = readNumber(line, 'total'); if (vTot !== null) { current.totalManual = vTot; continue; }

        if (line.includes('\t')) {
            const parts = line.split('\t').map(p => p.trim()).filter(Boolean);
            const numbers = parts.filter(p => !isNaN(p.replace(/,/g, '')));
            const strings = parts.filter(p => isNaN(p.replace(/,/g, '')));
            
            if (strings.length > 0 && numbers.length >= 4) {
                const possibleName = strings.find(s => !/^(rank|code|agent|ez|md|hd|ev|total|unit|gen|#|point)$/i.test(s));
                if (possibleName) {
                    saveCurrent();
                    current.nickname = possibleName;
                    current.easy = parseInt(numbers[numbers.length - 5] || numbers[0]) || 0;
                    current.med = parseInt(numbers[numbers.length - 4] || numbers[1]) || 0;
                    current.hard = parseInt(numbers[numbers.length - 3] || numbers[2]) || 0;
                    current.event = parseInt(numbers[numbers.length - 2] || numbers[3]) || 0;
                    current.totalManual = parseInt(numbers[numbers.length - 1] || numbers[4]) || 0;
                    saveCurrent();
                }
                continue;
            }
        }

        if (isNaN(line) && /[a-zA-Z]/.test(line) && !/^(rank|code|agent|ez|md|hd|ev|total|unit|gen|#|point)$/i.test(line)) {
            let numsAhead = [];
            for (let j = 1; j <= 5; j++) {
                if (i + j < lines.length) {
                    let nextLine = lines[i + j].replace(/,/g, '');
                    if (!isNaN(nextLine) && nextLine !== '') {
                        numsAhead.push(parseInt(nextLine));
                    } else {
                        break;
                    }
                }
            }
            
            if (numsAhead.length >= 4) {
                saveCurrent();
                current.nickname = line;
                current.easy = numsAhead[0];
                current.med = numsAhead[1];
                current.hard = numsAhead[2];
                current.event = numsAhead[3];
                if (numsAhead.length === 5) {
                    current.totalManual = numsAhead[4];
                    i += 5; 
                } else {
                    i += 4;
                }
                saveCurrent();
                continue;
            }
        }
      }

      saveCurrent();
      return items;
    }

    function buildOutputHTML(data) {
      const theme = themes[currentTheme];
      const numberText = normalizeNumber(outputNumberEl.value);
      const titleLine = 'REPORT // ' + theme.outputName + '-' + numberText;

      const rows = data.map((item, index) => {
        let rankBadge = item.rank || String(index + 1);
        let rowClass = "";
        if(index === 0) { rowClass = "rank-1"; rankBadge = "🏆 1"; }
        else if(index === 1) { rowClass = "rank-2"; rankBadge = "🥈 2"; }
        else if(index === 2) { rowClass = "rank-3"; rankBadge = "🥉 3"; }

        return `
          <tr class="${rowClass}">
            <td class="hide-col">${escapeHtml(item.rank || String(index + 1))}</td>
            <td class="hide-col code">${escapeHtml(item.accessCode || '')}</td>
            <td class="name" data-rank="${rankBadge}"><div class="name-text">${escapeHtml(item.nickname || '')}</div></td>
            <td class="val">${item.easy}</td>
            <td class="val">${item.med}</td>
            <td class="val">${item.hard}</td>
            <td class="val">${item.event}</td>
            <td class="hide-col">${escapeHtml(item.unit)}</td>
            <td class="hide-col">${escapeHtml(item.rank || String(index + 1))}</td>
            <td class="total"><span class="badge-total">${item.total}</span></td>
          </tr>`;
      }).join('');

      return `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>${escapeHtml(titleLine)}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: ${theme.accent};
      --accent-glow: color-mix(in srgb, var(--accent) 30%, transparent);
      --accent-hover: color-mix(in srgb, var(--accent) 15%, transparent);
      --accent-bg: color-mix(in srgb, var(--accent) 5%, #050507);
      
      --bg: #050507;
      --surface: #0e0e12;
      --surface-border: #1a1a24;
      --text-main: #f0f0f5;
      --text-muted: #8b8b9e;
      
      --font-ui: 'Outfit', sans-serif;
      --font-data: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at top center, var(--accent-bg), var(--bg) 80%);
      color: var(--text-main);
      font-family: var(--font-ui);
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header-card {
      background: rgba(14, 14, 18, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid var(--surface-border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    /* UKURAN FONT JUDUL (PC/DESKTOP) DIPERKECIL DI SINI */
    .title-box h1 {
      font-size: 0.95rem; 
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title-box .subtitle {
      font-family: var(--font-data);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;

    tr.rank-3 td.name::before { color: #cd7f32; font-weight: 800; font-size: 0.8rem; }

        padding: 3px 4px;
        font-size: 0.75rem;
        min-width: unset;

    }

</head>
<body>

  <div class="container">
    <div class="header-card">
      <div class="title-box">
        <h1>${escapeHtml(titleLine)}</h1>

      </div>
      <div class="stats-box">
        <div class="label">Total Agents</div>

      </div>
    </div>

    <div class="data-container">
      <table>
        <thead>
          <tr>
            <th class="hide-col">Rank</th>
            <th class="hide-col">Code</th>
            <th class="col-name">Agent</th>
            <th class="col-val">EZ</th>

        </tbody>

    <footer>EXTRACTED BY <span style="color:var(--accent); font-weight:bold;">PROGRAMMER ARM</span></footer>
  </div>

</body>
</html>`;
    }

    function generatePreview() {
      const data = parseBlocks(inputTextEl.value);

      data.sort((a, b) => b.total - a.total);

      data.forEach((item, index) => {
        item.rank = String(index + 1);
      });

      generatedHTML = buildOutputHTML(data);
      previewEl.srcdoc = generatedHTML;

      const theme = themes[currentTheme];
      const countText = data.length ? (data.length + ' Data Decrypted') : 'Awaiting Input...';
      statusEl.textContent = countText + ' | ' + theme.outputName + '-' + normalizeNumber(outputNumberEl.value);
      return generatedHTML;
    }

    function downloadHTML() {
      const html = generatePreview();
      const theme = themes[currentTheme];
      const numberText = normalizeNumber(outputNumberEl.value);
      const baseName = sanitizeFileName(fileNameEl.value);
      const fileName = baseName + '-' + theme.outputName.toLowerCase() + '-' + numberText + '.html';

      const blob = new Blob([html], {type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();

      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      statusEl.textContent = 'EXPORT SUCCESS: ' + fileName;
    }

    async function copyHTML() {
      const html = generatePreview();
      try {
        await navigator.clipboard.writeText(html);
        statusEl.textContent = 'SOURCE COPIED TO CLIPBOARD';
      } catch (err) {
        try {
          const ta = document.createElement('textarea');
          ta.value = html;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          statusEl.textContent = 'SOURCE COPIED TO CLIPBOARD';
        } catch (e) {
          statusEl.textContent = 'CLIPBOARD ACCESS DENIED';
        }
      }
    }

    function resetExample() {
      inputTextEl.value = ``;
      outputNumberEl.value = '001';
      fileNameEl.value = 'point_0002';
      setTheme('bravo');
      generatePreview();
      statusEl.textContent = 'SYSTEM WIPED AND RESET';
    }

    inputTextEl.addEventListener('input', generatePreview);
    outputNumberEl.addEventListener('input', function() {
      const theme = themes[currentTheme];
      themeBadgeTextEl.textContent = theme.outputName + '-' + normalizeNumber(outputNumberEl.value);
      generatePreview();
    });
    fileNameEl.addEventListener('input', function() {
      statusEl.textContent = 'TARGET FILENAME: ' + sanitizeFileName(fileNameEl.value) + '.html';
    });

    resetExample();
  </script>
</body>
</html>
