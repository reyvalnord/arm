<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROPERTY ARM AREA</title>
  <meta property="og:title" content="PROPERTY ARM AREA">
<meta property="og:description" content="Akses sistem ARM AREA - Secure Digital Interface">
<meta property="og:image" content="https://reyvalnord.github.io/arm/Screenshot_20260503-120108.jpg">
<meta property="og:url" content="https://situsresmiarmarea.netlify.app">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #002233;
      --bg-black: #05080a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-black);
      font-family: 'Share Tech Mono', monospace; /* */
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
      color: var(--neon-blue);
    }

    /* Efek Grid Latar Belakang Digital */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      transform: perspective(500px) rotateX(60deg);
      bottom: -50%;
      z-index: -1;
      animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 0 300px; }
    }

    .container {
      text-align: center;
      position: relative;
    }

    /* Header Teks Bergaya HUD */
    .loading-status {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 0 10px var(--neon-blue);
    }

    /* Progress Bar Tactical */
    .bar-wrapper {
      width: 300px;
      height: 2px; /* Lebih tipis agar terlihat elegan */
      background: var(--deep-blue);
      position: relative;
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--neon-blue);
      box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue); /* Glow Biru Kuat */
      position: relative;
      animation: fillBar 4s cubic-bezier(0.1, 0, 0.3, 1) forwards;
    }

    /* Efek cahaya yang lari di bar */
    .bar-fill::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 30px; height: 100%;
      background: #fff;
      filter: blur(5px);
      animation: scan 1.5s infinite;
    }

    @keyframes fillBar {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes scan {
      0% { left: -10%; }
      100% { left: 110%; }
    }

    /* Teks konsol di bawah bar */
    .console-log {
      margin-top: 15px;
      font-size: 10px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    .percentage {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
      font-family: 'Orbitron', sans-serif;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="loading-status">INITIALIZING PROXY</div> <!--[cite: 2] -->
    
    <div class="bar-wrapper">
      <div class="bar-fill"></div>
    </div>

    <div class="percentage" id="pct">0%</div>

    <div class="console-log">
      <span id="log-text">ESTABLISHING SECURE UPLINK...</span>
    </div>
  </div>

  <script>
    // Animasi angka persentase
    const pctElement = document.getElementById('pct');
    let count = 0;
    const interval = setInterval(() => {
      count++;
      pctElement.innerText = count + "%";
      if(count === 100) clearInterval(interval);
    }, 38);

    // Animasi teks log terminal[cite: 2]
    const logs = [
      "DECRYPTING PORTAL...",
      "BYPASSING FIREWALL...",
      "AUTHORIZING ACCESS...",
      "WELCOME TO ARM AREA"
    ];
    let logIdx = 0;
    setInterval(() => {
      if(logIdx < logs.length) {
        document.getElementById('log-text').innerText = logs[logIdx];
        logIdx++;
      }
    }, 1000);

    // Redirect otomatis[cite: 2]
    setTimeout(() => {
      window.location.href = "web.html";
    }, 4500);
  </script>

</body>
</html>
