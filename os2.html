<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Area Public</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <meta property="og:title" content="ARM AREA">
  <meta property="og:description" content="Secure Digital Interface ARM">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://armarea.netlify.app">

  <style>
    :root {
      --bg-color: #02040a;
      --panel: rgba(4, 10, 18, 0.78);
      --panel-2: rgba(255, 255, 255, 0.03);
      --text-main: #c5d8e6;
      --muted: rgba(197, 216, 230, 0.7);
      --cyan: #00f3ff;
      --cyan-soft: rgba(0, 243, 255, 0.14);
      --red: #ff2a2a;
      --red-soft: rgba(255, 42, 42, 0.14);
      --line: rgba(0, 243, 255, 0.12);
      --shadow: 0 0 18px rgba(0, 243, 255, 0.18), inset 0 0 24px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, rgba(0, 243, 255, 0.06) 0%, transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 42, 42, 0.08) 0%, transparent 40%),
        linear-gradient(180deg, #03060c 0%, #02040a 100%);
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.26) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 20;
      opacity: 0.8;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(0, 243, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.08) 1px, transparent 1px);
      background-size: 48px 48px;
      transform: perspective(800px) rotateX(62deg) translateY(-10%);
      animation: gridMove 16s linear infinite;
      opacity: 0.35;
    }

    .hex {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill='none' stroke='%2300f3ff' stroke-width='0.8' opacity='0.12'/%3E%3C/svg%3E");
      opacity: 0.12;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.36) 70%, rgba(0,0,0,0.72) 100%);
    }

    @keyframes gridMove {
      from { transform: perspective(800px) rotateX(62deg) translateY(-10%); }
      to { transform: perspective(800px) rotateX(62deg) translateY(0%); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .terminal {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(12, 18, 28, 0.92), rgba(5, 10, 16, 0.92));
      border: 1px solid rgba(0, 243, 255, 0.16);
      box-shadow: var(--shadow);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .terminal::before,
    .terminal::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border: 2px solid var(--cyan);
      opacity: 0.9;
      pointer-events: none;
    }

    .terminal::before {
      top: 10px;
      left: 10px;
      border-right: 0;
      border-bottom: 0;
    }

    .terminal::after {
      right: 10px;
      bottom: 10px;
      border-left: 0;
      border-top: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(0, 243, 255, 0.12);
      background: rgba(255,255,255,0.02);
    }

    .topbar .left,
    .topbar .right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--cyan);
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    .hero {
      padding: 34px 22px 20px;
      text-align: center;
    }

    .kicker {
      color: var(--cyan);
      font-size: 11px;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 5px;
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 243, 255, 0.55), 0 0 25px rgba(0, 243, 255, 0.25);
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(0, 243, 255, 0.14);
      background: rgba(0, 243, 255, 0.05);
      border-radius: 999px;
      color: #fff;
      letter-spacing: 1px;
      font-size: 12px;
      box-shadow: 0 0 18px rgba(0, 243, 255, 0.08);
    }

    .status b {
      color: var(--cyan);
    }

    .blink {
      color: var(--red);
      animation: blink 1s step-end infinite;
    }

    .content {
      padding: 0 22px 24px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(0, 243, 255, 0.1);
      border-radius: 14px;
      padding: 18px;
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.28);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,243,255,0.08), transparent 30%, transparent 70%, rgba(255,42,42,0.06));
      pointer-events: none;
    }

    .panel h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 14px;
      text-transform: uppercase;
      border-bottom: 1px dashed rgba(0, 243, 255, 0.16);
      padding-bottom: 10px;
    }

    .panel p {
      line-height: 1.8;
      color: rgba(197, 216, 230, 0.86);
      font-size: 14px;
    }

    .typewriter {
      min-height: 90px;
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 16px;
      background: var(--cyan);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      margin-left: 3px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 6px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(0, 243, 255, 0.22);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.18));
      color: var(--cyan);
      padding: 13px 14px;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transform: translateX(-120%);
      transition: transform 0.45s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      color: #fff;
      border-color: rgba(0, 243, 255, 0.45);
      box-shadow: 0 0 18px rgba(0, 243, 255, 0.16);
      background: rgba(0, 243, 255, 0.08);
    }

    .btn:hover::before {
      transform: translateX(120%);
    }

    .btn.red {
      border-color: rgba(255, 42, 42, 0.28);
      color: #ffb4b4;
    }

    .btn.red:hover {
      background: rgba(255, 42, 42, 0.08);
      border-color: rgba(255, 42, 42, 0.52);
      box-shadow: 0 0 18px rgba(255, 42, 42, 0.15);
    }

    .log {
      margin-top: 14px;
      padding: 14px;
      background: rgba(0,0,0,0.58);
      border: 1px solid rgba(0, 243, 255, 0.14);
      border-radius: 12px;
      min-height: 160px;
      max-height: 220px;
      overflow-y: auto;
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.35);
    }

    .log p {
      font-size: 12px;
      color: rgba(197, 216, 230, 0.82);
      margin-bottom: 6px;
    }

    .log p::before {
      content: "> ";
      color: var(--cyan);
    }

    .mini-grid {
      display: grid;
      gap: 12px;
    }

    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(0, 243, 255, 0.1);
      border-radius: 14px;
      padding: 14px;
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: rgba(197, 216, 230, 0.85);
      padding: 8px 0;
      border-bottom: 1px solid rgba(0, 243, 255, 0.08);
    }

    .card-row:last-child {
      border-bottom: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 243, 255, 0.16);
      color: var(--cyan);
      background: rgba(0, 243, 255, 0.06);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer {
      padding: 14px 18px 18px;
      border-top: 1px solid rgba(0, 243, 255, 0.12);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: rgba(197, 216, 230, 0.55);
      font-size: 10px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .footer b {
      color: var(--cyan);
    }

    @media (max-width: 860px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 12px 14px;
      }

      .hero {
        padding: 28px 16px 18px;
      }

      .content {
        padding: 0 14px 18px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .title {
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="grid"></div>
    <div class="hex"></div>
    <div class="vignette"></div>
  </div>

  <div class="wrap">
    <div class="terminal">
      <div class="topbar">
        <div class="left">
          <span class="dot"></span>
          <span class="tag">SYS.OP // UPLINK ESTABLISHED</span>
        </div>
        <div class="right">
          <span class="tag">AREA</span>
          <span class="tag">ON</span>
        </div>
      </div>

      <div class="hero">
        <div class="kicker">Anonymous Area</div>
        <h1 class="title">PUBLIC_OS</h1>
        <div class="subtitle">Eksternal gateway</div>
      </div>

      <div class="content">
        <section class="panel">
          <h2>01 // Terminal Intro</h2>
          <p class="typewriter" id="typewriter-text"></p>

          <div class="log" id="logOutput">
            <p>Awaiting commands...</p>
          </div>
        </section>

        <section class="panel">
          <h2>02 // Access Modules</h2>

          <div class="buttons">
            <button class="btn" onclick="navigateTo('https://whatsapp.com/channel/0029VbAlKzZDjiOd3hXfnb30', '>> Accessing PUBLIC system...')">Access Public</button>
            <button class="btn" onclick="navigateTo('kelulusan/phantom.html', '>> Accessing ANNOUNCEMENT system...')">log agent</button>
            <button class="btn" onclick="navigateTo('https://situshakpatenarm.netlify.app/', '>> Accessing HAK PATEN system...')">Hak Paten</button>
            <button class="btn" onclick="navigateTo('database.html', '>> Accessing DATABASE...')">Database</button>
            <button class="btn" onclick="navigateTo('database.html', '>> Accessing GAME system...')">Game</button>
          </div>

          <div class="mini-grid" style="margin-top: 16px;">
            <div class="card">
              <div class="card-title">System Profile</div>
              <div class="card-row"><span>Theme</span><span class="pill">Phantom Cell</span></div>
              <div class="card-row"><span>Status</span><span class="pill" style="color:#ffb4b4;border-color:rgba(255,42,42,.2);background:rgba(255,42,42,.06);">Public</span></div>
            </div>
          </div>
        </section>
      </div>

      <div class="footer">
        <span>ENCRYPTED CONNECTION</span>
        <span>&copy; 2026 <b>ARM AREA</b></span>
        <span>ALL SYSTEMS NOMINAL</span>
      </div>
    </div>
  </div>

  <audio id="typeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-typing-on-computer-keyboard-1485.mp3" preload="auto"></audio>

  <script>
    const text = "PROPERTY ARM\nSelect a module to continue.";
    const target = document.getElementById("typewriter-text");
    const sound = document.getElementById("typeSound");

    let index = 0;
    function typeWriter() {
      if (index < text.length) {
        target.innerHTML = text.slice(0, index + 1).replace(/\n/g, "<br>") + '<span class="cursor"></span>';
        if (text.charAt(index) !== " " && text.charAt(index) !== "\n") {
          sound.currentTime = 0;
          sound.play().catch(() => {});
        }
        index++;
        setTimeout(typeWriter, 58);
      } else {
        target.innerHTML = text.replace(/\n/g, "<br>") + '<span class="cursor"></span>';
      }
    }

    function logAction(message) {
      const log = document.getElementById("logOutput");
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement("p");
      entry.textContent = `[${time}] ${message}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    function navigateTo(url, logMessage) {
      logAction(logMessage);
      setTimeout(() => {
        window.location.href = url;
      }, 800);
    }

    window.addEventListener("load", () => {
      typeWriter();
      logAction("SYSTEM READY.");
    });
  </script>
</body>
</html>
